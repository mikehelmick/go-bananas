#
# Builds the Hugo + Docsy documentation site under docs/ and deploys it to
# GitHub Pages. Enable Pages for the repository with "GitHub Actions" as the
# source (Settings → Pages) for this workflow to publish.

name: Deploy docs to Pages

on:
  push:
    branches: ['main']
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; do not cancel an in-progress run.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    env:
      HUGO_VERSION: '0.162.1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # for .GitInfo / lastmod

      - name: Setup Go # Hugo Modules (Docsy) require Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Install Hugo (extended)
        run: |
          wget -q -O hugo.deb "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i hugo.deb

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Docsy npm dependencies
        run: |
          hugo mod npm pack
          npm install

      - name: Build site
        run: hugo --minify --gc --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
