baseURL = "https://mikehelmick.github.io/go-bananas/"
title = "go-bananas"
enableRobotsTXT = true
enableGitInfo = true

# Language
contentDir = "content/en"
defaultContentLanguage = "en"

[languages]
  [languages.en]
    label = "English"
    weight = 1
    [languages.en.params]
      title = "go-bananas"
      description = "The application framework for Go that is so simple, it's Bananas."

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "tango"

[module]
  proxy = "direct"
  [module.hugoVersion]
    extended = true
    min = "0.110.0"
  [[module.imports]]
    path = "github.com/google/docsy"
  [[module.imports]]
    path = "github.com/google/docsy/dependencies"

[params]
  copyright = "the go-bananas authors"
  github_repo = "https://github.com/mikehelmick/go-bananas"
  github_branch = "main"
  offlineSearch = true

  [params.ui]
    breadcrumb_disable = false
    navbar_logo = false
    sidebar_menu_compact = false
    sidebar_search_disable = false

  [[params.links.user]]
    name = "pkg.go.dev"
    url = "https://pkg.go.dev/github.com/mikehelmick/go-bananas"
    icon = "fa-solid fa-book"
    desc = "API reference"
  [[params.links.developer]]
    name = "GitHub"
    url = "https://github.com/mikehelmick/go-bananas"
    icon = "fab fa-github"
    desc = "Source code"

[[menu.main]]
  name = "API Reference"
  weight = 30
  url = "https://pkg.go.dev/github.com/mikehelmick/go-bananas"
